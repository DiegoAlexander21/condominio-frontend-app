<div class="contenedor-principal">
  <div class="contenedor-formulario">
    <h2 class="titulo-principal">Nuevo Checklist Sanitario</h2>

    <form [formGroup]="formulario" (ngSubmit)="guardar()" class="formulario-flex">
      
      <div class="fila-controles">
        <div class="grupo-control">
          <label>Área Común</label>
          <ng-container *ngIf="areaNombreReadOnly; else selectArea">
            <input type="text" [value]="areaNombreReadOnly" disabled>
          </ng-container>
          <ng-template #selectArea>
            <select formControlName="areaComunId">
              <option value="">Seleccione un área</option>
              <option *ngFor="let area of areasComunes" [value]="area.id">
                {{ area.nombre }}
              </option>
            </select>
          </ng-template>
          <app-mensaje-error [control]="formulario.get('areaComunId')" nombreCampo="El área"></app-mensaje-error>
        </div>
      </div>

      <div class="fila-controles">
        <div class="grupo-control">
          <label>Nombre del Checklist</label>
          <input type="text" formControlName="nombre" placeholder="Ej. Control de Piscina">
          <app-mensaje-error [control]="formulario.get('nombre')" nombreCampo="El nombre"></app-mensaje-error>
        </div>
      </div>

      <div class="seccion-items">
        <div class="cabecera-items">
          <h3>Ítems a evaluar</h3>
          <button type="button" class="boton-secundario boton-pequeno" (click)="agregarItem()">
            <span class="material-symbols-outlined">add</span> Agregar Ítem
          </button>
        </div>

        <div formArrayName="items" class="lista-items">
          <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-control">
            <div class="grupo-control item-input">
              <input type="text" formControlName="descripcion" [placeholder]="'Ítem ' + (i + 1)">
              <button type="button" class="boton-eliminar-item" (click)="removerItem(i)" title="Eliminar ítem" *ngIf="items.length > 1">
                <span class="material-symbols-outlined">close</span>
              </button>
            </div>
            <app-mensaje-error [control]="item.get('descripcion')" nombreCampo="La descripción del ítem"></app-mensaje-error>
          </div>
        </div>
      </div>

      <div class="acciones-formulario">
        <button type="button" class="boton-secundario" (click)="cancelar()" [disabled]="guardando">Cancelar</button>
        <button type="submit" class="boton-primario" [disabled]="formulario.invalid || guardando">
          {{ guardando ? 'Guardando...' : 'Guardar Checklist' }}
        </button>
      </div>

    </form>
  </div>
</div>
