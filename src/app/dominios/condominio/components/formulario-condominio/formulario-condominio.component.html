<div class="contenedor-formulario">
  <h2 class="titulo-principal">{{ esEdicion ? 'Editar Condominio' : 'Nuevo Condominio' }}</h2>

  <form [formGroup]="formularioCondominio" (ngSubmit)="guardarDatos()" class="formulario">
    <div class="grupo-control">
      <label for="nombre">Nombre del Condominio</label>
      <input type="text" id="nombre" formControlName="nombre" placeholder="Ej. Los Portales">
      <div class="mensaje-error" *ngIf="formularioCondominio.get('nombre')?.invalid && formularioCondominio.get('nombre')?.touched">
        El nombre es requerido y debe tener al menos 2 caracteres.
      </div>
    </div>

    <div class="fila-controles">
      <div class="grupo-control">
        <label for="torres">Número de Torres</label>
        <input type="number" id="torres" formControlName="torres" min="1">
        <div class="mensaje-error" *ngIf="formularioCondominio.get('torres')?.invalid && formularioCondominio.get('torres')?.touched">
          Debe tener al menos 1 torre.
        </div>
      </div>

      <div class="grupo-control">
        <label for="pisosPorTorre">Pisos por Torre</label>
        <input type="number" id="pisosPorTorre" formControlName="pisosPorTorre" min="1">
        <div class="mensaje-error" *ngIf="formularioCondominio.get('pisosPorTorre')?.invalid && formularioCondominio.get('pisosPorTorre')?.touched">
          Debe tener al menos 1 piso.
        </div>
      </div>
    </div>

    <div class="acciones-formulario">
      <button type="button" class="boton-secundario" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="boton-primario" [disabled]="formularioCondominio.invalid">Guardar</button>
    </div>
  </form>
</div>
