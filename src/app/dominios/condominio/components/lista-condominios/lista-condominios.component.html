<div class="contenedor-condominios">
  <header class="cabecera-lista">
    <h2 class="titulo-principal">Gestión de Condominios</h2>
    <button class="boton-primario" routerLink="/condominios/nuevo">Nuevo Condominio</button>
  </header>
  
  <ng-container *ngIf="respuestaPaginada$ | async as respuesta; else cargando">
    <div class="grilla-tarjetas">
      <div class="tarjeta" *ngFor="let condominio of respuesta.contenido">
        
        <div class="tarjeta-encabezado">
          <h3 class="tarjeta-titulo">{{ condominio.nombre }}</h3>
          <app-menu-contextual 
            [identificador]="condominio.id" 
            (alEditar)="editarCondominio($event)" 
            (alEliminar)="eliminarCondominio($event)">
          </app-menu-contextual>
        </div>

        <div class="tarjeta-detalle">
          <p><strong>Torres:</strong> {{ condominio.torres }}</p>
          <p><strong>Pisos por Torre:</strong> {{ condominio.pisosPorTorre }}</p>
        </div>

      </div>
    </div>
    
    <app-paginacion 
      [paginaActual]="respuesta.paginaActual" 
      [totalPaginas]="respuesta.totalPaginas" 
      (cambioPagina)="cambiarPagina($event)">
    </app-paginacion>
  </ng-container>
  
  <ng-template #cargando>
    <p class="texto-cargando">Cargando la información de los condominios...</p>
  </ng-template>

  <app-modal-confirmacion 
    [visible]="mostrarModalEliminar" 
    titulo="Eliminar Condominio"
    mensaje="¿Estás seguro que deseas eliminar este condominio de forma permanente?"
    textoConfirmar="Eliminar"
    (alCancelar)="cancelarEliminacion()" 
    (alConfirmar)="confirmarEliminacion()">
  </app-modal-confirmacion>
</div>
