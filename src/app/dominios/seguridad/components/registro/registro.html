<div class="contenedor-registro-minimalista">
  <div class="encabezado-superior">
    <h1 class="titulo-gigante">Registro</h1>
  </div>

  <div class="cuerpo-formulario">
    <form [formGroup]="formularioRegistro" (ngSubmit)="procesarRegistro()" class="formulario-minimalista">
      
      <div class="fila">
        <div class="grupo-control">
          <label for="nombres">Nombres *</label>
          <input type="text" id="nombres" formControlName="nombres">
          <app-mensaje-error [control]="formularioRegistro.get('nombres')" nombreCampo="El nombre"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label for="apellidos">Apellidos *</label>
          <input type="text" id="apellidos" formControlName="apellidos">
          <app-mensaje-error [control]="formularioRegistro.get('apellidos')" nombreCampo="El apellido"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label for="tipoDocumento">Tipo Doc. *</label>
          <select id="tipoDocumento" formControlName="tipoDocumento">
            <option value="" disabled selected></option>
            <option *ngFor="let tipo of tiposDocumento" [value]="tipo">{{tipo}}</option>
          </select>
          <app-mensaje-error [control]="formularioRegistro.get('tipoDocumento')" nombreCampo="El tipo de documento"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label for="numeroDocumento">Núm. Doc. *</label>
          <input type="text" id="numeroDocumento" formControlName="numeroDocumento">
          <app-mensaje-error [control]="formularioRegistro.get('numeroDocumento')" nombreCampo="El número"></app-mensaje-error>
        </div>
      </div>

      <div class="fila">
        <div class="grupo-control">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" formControlName="telefono">
          <app-mensaje-error [control]="formularioRegistro.get('telefono')" nombreCampo="El teléfono"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label for="rol">Rol *</label>
          <select id="rol" formControlName="rol">
            <option value="" disabled selected></option>
            <option *ngFor="let rol of nombresRoles" [value]="rol">{{rol}}</option>
          </select>
          <app-mensaje-error [control]="formularioRegistro.get('rol')" nombreCampo="El rol"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label for="correo">Email *</label>
          <input type="email" id="correo" formControlName="correo">
          <app-mensaje-error [control]="formularioRegistro.get('correo')" nombreCampo="El correo"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label for="contrasena">Contraseña *</label>
          <input type="password" id="contrasena" formControlName="contrasena">
          <app-mensaje-error [control]="formularioRegistro.get('contrasena')" nombreCampo="La contraseña"></app-mensaje-error>
        </div>
      </div>

      <div class="acciones-formulario">
        <div class="alerta-servidor" *ngIf="mensajeServidor">
          {{ mensajeServidor }}
        </div>
        <button type="submit" class="boton-primario" [disabled]="formularioRegistro.invalid">Registrarse</button>
        <div class="enlace-login">
          <a routerLink="/login">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
      </div>

    </form>
  </div>
</div>
