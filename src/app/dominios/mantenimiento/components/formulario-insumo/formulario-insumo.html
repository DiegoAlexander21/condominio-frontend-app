<div class="contenedor-principal">
  <div class="contenedor-formulario">
    <h2 class="titulo-principal">Registrar Insumo (Inventario)</h2>

    <form [formGroup]="formulario" (ngSubmit)="guardar()" class="formulario-flex">
      
      <div class="fila-controles">
        <div class="grupo-control">
          <label>Nombre del Insumo</label>
          <input type="text" formControlName="nombre" placeholder="Ej. Lejía, Escoba, Filtro de Aire">
          <app-mensaje-error [control]="formulario.get('nombre')" nombreCampo="El nombre"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label>Unidad de Medida</label>
          <select formControlName="unidadMedida">
            <option value="">Seleccione una unidad</option>
            <option value="Litros">Litros (L)</option>
            <option value="Unidades">Unidades (Und)</option>
            <option value="Galones">Galones (Gal)</option>
            <option value="Kilogramos">Kilogramos (Kg)</option>
          </select>
          <app-mensaje-error [control]="formulario.get('unidadMedida')" nombreCampo="La unidad de medida"></app-mensaje-error>
        </div>
      </div>

      <div class="fila-controles">
        <div class="grupo-control">
          <label>Stock Inicial</label>
          <input type="number" formControlName="stockActual" placeholder="Ej. 10">
          <app-mensaje-error [control]="formulario.get('stockActual')" nombreCampo="El stock inicial"></app-mensaje-error>
        </div>
        <div class="grupo-control">
          <label>Stock Mínimo (Alerta)</label>
          <input type="number" formControlName="stockMinimo" placeholder="Ej. 2">
          <app-mensaje-error [control]="formulario.get('stockMinimo')" nombreCampo="El stock mínimo"></app-mensaje-error>
        </div>
      </div>

      <div class="fila-controles">
        <div class="grupo-control">
          <label>Precio Unitario (Soles - PEN)</label>
          <div class="input-moneda">
            <span class="prefijo-moneda">S/ </span>
            <input type="number" step="0.01" formControlName="precioUnitario" placeholder="Ej. 5.50">
          </div>
          <app-mensaje-error [control]="formulario.get('precioUnitario')" nombreCampo="El precio unitario"></app-mensaje-error>
        </div>
      </div>

      <div class="acciones-formulario">
        <button type="button" class="boton-secundario" (click)="cancelar()" [disabled]="guardando">Cancelar</button>
        <button type="submit" class="boton-primario" [disabled]="formulario.invalid || guardando">
          {{ guardando ? 'Guardando...' : 'Guardar Insumo' }}
        </button>
      </div>

    </form>
  </div>
</div>
