<div class="contenedor-unidades">
  <header class="cabecera-lista">
    <h2 class="titulo-principal">Gestión de Unidades</h2>
    <button class="boton-primario" routerLink="/unidades/nuevo">Nueva Unidad</button>
  </header>
  
  <ng-container *ngIf="respuestaPaginada$ | async as respuesta; else cargando">
    <div class="grilla-tarjetas">
      <div class="tarjeta" *ngFor="let unidad of respuesta.contenido">
        
        <div class="tarjeta-encabezado">
          <h3 class="tarjeta-titulo">{{ unidad.torre }} - Dpto {{ unidad.numeroUnidad }}</h3>
          <app-menu-contextual 
            [identificador]="unidad.id" 
            [mostrarAsignarOcupantes]="true"
            (alEditar)="editarUnidad($event)" 
            (alEliminar)="eliminarUnidad($event)"
            (alAsignarOcupantes)="asignarOcupantes($event)">
          </app-menu-contextual>
        </div>

        <div class="tarjeta-detalle">
          <p><strong>Condominio:</strong> {{ unidad.nombreCondominio }}</p>
          <p><strong>Piso:</strong> {{ unidad.piso }}</p>
          <p><strong>Área:</strong> {{ unidad.area | number:'1.2-2' }} m²</p>
          <p><strong>Estado:</strong> 
            <span class="etiqueta-estado" [class.ocupado]="unidad.estado.includes('Ocupado')" [class.asignado]="unidad.estado === 'Propietario asignado'">
              {{ unidad.estado }}
            </span>
          </p>
        </div>

      </div>
    </div>
    
    <app-paginacion 
      [paginaActual]="respuesta.paginaActual" 
      [totalPaginas]="respuesta.totalPaginas" 
      (cambioPagina)="cambiarPagina($event)">
    </app-paginacion>
  </ng-container>
  
  <ng-template #cargando>
    <p class="texto-cargando">Cargando la información de las unidades...</p>
  </ng-template>

  <app-modal-confirmacion 
    [visible]="mostrarModalEliminar" 
    titulo="Eliminar Unidad"
    mensaje="¿Estás seguro que deseas eliminar esta unidad de forma permanente?"
    textoConfirmar="Eliminar"
    (alCancelar)="cancelarEliminacion()" 
    (alConfirmar)="confirmarEliminacion()">
  </app-modal-confirmacion>
</div>
