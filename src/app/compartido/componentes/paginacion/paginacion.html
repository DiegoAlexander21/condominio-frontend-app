<div class="contenedor-paginacion" *ngIf="totalPaginas > 0">
  <button class="boton-paginacion" (click)="irAnterior()" [disabled]="paginaActual === 0">
    Anterior
  </button>
  
  <span class="indicador-pagina">
    Página {{ paginaActual + 1 }} de {{ totalPaginas }}
  </span>
  
  <button class="boton-paginacion" (click)="irSiguiente()" [disabled]="paginaActual === totalPaginas - 1">
    Siguiente
  </button>
</div>
