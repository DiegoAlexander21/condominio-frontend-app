<div class="contenedor-menu-contextual">
  <button class="boton-tres-puntos" (click)="alternarMenu()" aria-label="Opciones">
    <span class="material-symbols-outlined">more_vert</span>
  </button>

  <div class="menu-desplegable" *ngIf="menuAbierto">
    <button class="opcion-menu" *ngIf="mostrarAsignarOcupantes" (click)="asignarOcupantes()">
      <span class="material-symbols-outlined" style="margin-right: 8px; font-size: 1.1em;">group_add</span>
      Asignar Ocupantes
    </button>
    <button class="opcion-menu" *ngIf="mostrarVerDetalle" (click)="verDetalle()">
      <span class="material-symbols-outlined" style="margin-right: 8px; font-size: 1.1em;">visibility</span>
      Ver Detalles
    </button>
    <button class="opcion-menu" *ngIf="mostrarEditar" (click)="editar()">
      <span class="material-symbols-outlined" style="margin-right: 8px; font-size: 1.1em;">edit</span>
      Editar
    </button>
    <button class="opcion-menu opcion-eliminar" (click)="eliminar()">
      <span class="material-symbols-outlined" style="margin-right: 8px; font-size: 1.1em;">delete</span>
      Eliminar
    </button>
  </div>
</div>
