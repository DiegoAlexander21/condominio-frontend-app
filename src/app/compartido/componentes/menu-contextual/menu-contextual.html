<div class="contenedor-menu-contextual">
  <button class="boton-tres-puntos" (click)="alternarMenu()" aria-label="Opciones">
    <span class="material-symbols-outlined">more_vert</span>
  </button>

  <div class="menu-desplegable" *ngIf="menuAbierto">
    <button class="opcion-menu" *ngIf="mostrarAsignarOcupantes" (click)="asignarOcupantes()">
      <span class="material-symbols-outlined icono-opcion">group_add</span>
      Asignar Ocupantes
    </button>
    <button class="opcion-menu" *ngIf="mostrarVerDetalle" (click)="verDetalle()">
      <span class="material-symbols-outlined icono-opcion">visibility</span>
      Ver Detalles
    </button>
    <button class="opcion-menu" *ngIf="mostrarActualizarEstado" (click)="actualizarEstado()">
      <span class="material-symbols-outlined icono-opcion">update</span>
      Actualizar Estado
    </button>
    <button class="opcion-menu" *ngIf="mostrarEditar" (click)="editar()">
      <span class="material-symbols-outlined icono-opcion">edit</span>
      Editar
    </button>
    <button class="opcion-menu" *ngIf="mostrarEvaluar" (click)="evaluar()">
      <span class="material-symbols-outlined icono-opcion">fact_check</span>
      Evaluar
    </button>
    <button class="opcion-menu" *ngIf="mostrarDistribuir" (click)="distribuir()">
      <span class="material-symbols-outlined icono-opcion">account_tree</span>
      Distribuir
    </button>
    <button class="opcion-menu" *ngIf="mostrarRegistrarPago" (click)="registrarPago()">
      <span class="material-symbols-outlined icono-opcion">payments</span>
      Registrar Pago
    </button>
    <button class="opcion-menu" *ngIf="mostrarAprobar" (click)="aprobar()">
      <span class="material-symbols-outlined icono-opcion">check_circle</span>
      Aprobar
    </button>
    <button class="opcion-menu opcion-eliminar" *ngIf="mostrarRechazar" (click)="rechazar()">
      <span class="material-symbols-outlined icono-opcion">cancel</span>
      Rechazar
    </button>
    <button class="opcion-menu" *ngIf="mostrarCalificar" (click)="calificar()">
      <span class="material-symbols-outlined icono-opcion">star_rate</span>
      Calificar
    </button>
    <button class="opcion-menu opcion-eliminar" *ngIf="mostrarEliminar" (click)="eliminar()">
      <span class="material-symbols-outlined icono-opcion">delete</span>
      Eliminar
    </button>
  </div>
</div>
