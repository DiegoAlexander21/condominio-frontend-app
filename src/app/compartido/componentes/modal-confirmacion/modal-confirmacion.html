<div class="fondo-modal" [class.activo]="visible" (click)="cancelar()"></div>

<div class="modal-confirmacion" [class.activo]="visible">
  <div class="cabecera-modal">
    <h3>Cerrar Sesión</h3>
  </div>
  <div class="cuerpo-modal">
    <p>¿Estás seguro que deseas salir del sistema?</p>
  </div>
  <div class="pie-modal">
    <button class="boton-secundario" (click)="cancelar()">Cancelar</button>
    <button class="boton-peligro" (click)="confirmar()">Sí, salir</button>
  </div>
</div>
